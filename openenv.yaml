version: '1.0'
name: 'DataPipeline-Sentry: Financial Data Lake Reliability'
description: >
  An AI agent acts as a Data Reliability Engineer managing a real-time
  Financial Data Lake.  It must detect schema drift, handle late-arriving
  trade data, and quarantine poisoned data sources to prevent
  multi-million dollar trading errors.
docker:
  build: Dockerfile
entrypoint:
  server: uvicorn app.server:app --host 0.0.0.0 --port 7860
